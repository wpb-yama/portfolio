<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#009c3b"/>
      <stop offset="100%" stop-color="#002776"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Card: Submission Status -->
  <rect x="60" y="70" width="220" height="130" rx="10" fill="white" fill-opacity="0.12"/>
  <text x="80" y="100" font-family="system-ui,sans-serif" font-size="11" fill="white" fill-opacity="0.6" letter-spacing="1">DAILY SUBMISSIONS</text>
  <text x="80" y="138" font-family="system-ui,sans-serif" font-size="38" font-weight="700" fill="white">100%</text>
  <text x="80" y="162" font-family="system-ui,sans-serif" font-size="12" fill="#4ade80">↑ Acceptance rate</text>

  <!-- Card: Reports Filed -->
  <rect x="320" y="70" width="220" height="130" rx="10" fill="white" fill-opacity="0.12"/>
  <text x="340" y="100" font-family="system-ui,sans-serif" font-size="11" fill="white" fill-opacity="0.6" letter-spacing="1">REPORTS FILED</text>
  <text x="340" y="138" font-family="system-ui,sans-serif" font-size="38" font-weight="700" fill="white">2,847</text>
  <text x="340" y="162" font-family="system-ui,sans-serif" font-size="12" fill="#4ade80">↑ 12% this month</text>

  <!-- Bar chart -->
  <rect x="60" y="240" width="480" height="160" rx="10" fill="white" fill-opacity="0.08"/>
  <text x="80" y="268" font-family="system-ui,sans-serif" font-size="11" fill="white" fill-opacity="0.6" letter-spacing="1">SUBMISSION PIPELINE</text>
  <!-- Bars -->
  <rect x="90"  y="340" width="40" height="44" rx="4" fill="#4ade80" fill-opacity="0.9"/>
  <rect x="150" y="315" width="40" height="69" rx="4" fill="#4ade80" fill-opacity="0.9"/>
  <rect x="210" y="325" width="40" height="59" rx="4" fill="#4ade80" fill-opacity="0.9"/>
  <rect x="270" y="300" width="40" height="84" rx="4" fill="#4ade80" fill-opacity="0.9"/>
  <rect x="330" y="310" width="40" height="74" rx="4" fill="#4ade80" fill-opacity="0.9"/>
  <rect x="390" y="295" width="40" height="89" rx="4" fill="#4ade80" fill-opacity="0.9"/>
  <rect x="450" y="285" width="40" height="99" rx="4" fill="white" fill-opacity="0.5"/>
  <!-- X labels -->
  <text x="103" y="397" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle">Oct</text>
  <text x="163" y="397" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle">Nov</text>
  <text x="223" y="397" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle">Dec</text>
  <text x="283" y="397" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle">Jan</text>
  <text x="343" y="397" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle">Feb</text>
  <text x="403" y="397" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle">Mar</text>
  <text x="463" y="397" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle">Apr</text>

  <!-- Status rows -->
  <rect x="60" y="440" width="480" height="110" rx="10" fill="white" fill-opacity="0.08"/>
  <text x="80" y="466" font-family="system-ui,sans-serif" font-size="11" fill="white" fill-opacity="0.6" letter-spacing="1">COMPLIANCE STATUS</text>
  <!-- Row 1 -->
  <circle cx="86" cy="490" r="5" fill="#4ade80"/>
  <text x="100" y="494" font-family="system-ui,sans-serif" font-size="12" fill="white" fill-opacity="0.85">Bet data submitted</text>
  <text x="480" y="494" font-family="system-ui,sans-serif" font-size="12" fill="#4ade80" text-anchor="end">Accepted</text>
  <!-- Row 2 -->
  <circle cx="86" cy="514" r="5" fill="#4ade80"/>
  <text x="100" y="518" font-family="system-ui,sans-serif" font-size="12" fill="white" fill-opacity="0.85">Player KYC records</text>
  <text x="480" y="518" font-family="system-ui,sans-serif" font-size="12" fill="#4ade80" text-anchor="end">Accepted</text>
  <!-- Row 3 -->
  <circle cx="86" cy="538" r="5" fill="#4ade80"/>
  <text x="100" y="542" font-family="system-ui,sans-serif" font-size="12" fill="white" fill-opacity="0.85">Financial reconciliation</text>
  <text x="480" y="542" font-family="system-ui,sans-serif" font-size="12" fill="#4ade80" text-anchor="end">Accepted</text>
</svg>
