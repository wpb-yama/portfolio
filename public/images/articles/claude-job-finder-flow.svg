<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 510" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaaaaa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1460" height="510" fill="#ffffff"/>

  <!-- Title -->
  <text x="730" y="38" text-anchor="middle" font-size="18" font-weight="600" fill="#1C1C1C" letter-spacing="-0.01em">Job Finder: Daily Automation Flow</text>

  <!-- Job Boards Container -->
  <rect x="20" y="58" width="220" height="440" rx="12" fill="#f9f9f9" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="130" y="82" text-anchor="middle" font-size="10.5" font-weight="700" fill="#aaaaaa" letter-spacing="0.08em">JOB BOARDS</text>

  <!-- Source: Pentasia -->
  <rect x="38" y="96" width="184" height="40" rx="7" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="130" y="121" text-anchor="middle" font-size="12.5" fill="#444444">Pentasia</text>

  <!-- Source: BettingJobs -->
  <rect x="38" y="144" width="184" height="40" rx="7" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="130" y="169" text-anchor="middle" font-size="12.5" fill="#444444">BettingJobs</text>

  <!-- Source: TalentBet -->
  <rect x="38" y="192" width="184" height="40" rx="7" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="130" y="217" text-anchor="middle" font-size="12.5" fill="#444444">TalentBet</text>

  <!-- Source: iGaming Recruitment -->
  <rect x="38" y="240" width="184" height="40" rx="7" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="130" y="265" text-anchor="middle" font-size="11.5" fill="#444444">iGaming Recruitment</text>

  <!-- Source: Van Kaizen -->
  <rect x="38" y="288" width="184" height="40" rx="7" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="130" y="313" text-anchor="middle" font-size="12.5" fill="#444444">Van Kaizen</text>

  <!-- Source: iGamingCareer -->
  <rect x="38" y="336" width="184" height="40" rx="7" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="130" y="361" text-anchor="middle" font-size="12.5" fill="#444444">iGamingCareer</text>

  <!-- Source: iGaming Business -->
  <rect x="38" y="384" width="184" height="40" rx="7" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="130" y="409" text-anchor="middle" font-size="12.5" fill="#444444">iGaming Business</text>

  <!-- Arrow: JB Container to Scraper -->
  <line x1="240" y1="278" x2="308" y2="278" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Scraper Box -->
  <rect x="310" y="228" width="170" height="100" rx="12" fill="#ede9fe" stroke="#4f46e5" stroke-width="2"/>
  <text x="395" y="263" text-anchor="middle" font-size="13.5" font-weight="600" fill="#4f46e5">Python</text>
  <text x="395" y="282" text-anchor="middle" font-size="13.5" font-weight="600" fill="#4f46e5">Scraper</text>
  <text x="395" y="308" text-anchor="middle" font-size="10.5" fill="#7c3aed">Playwright (headless)</text>

  <!-- Arrow: Scraper to Filter -->
  <line x1="480" y1="278" x2="548" y2="278" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Filter Box -->
  <rect x="550" y="228" width="170" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="635" y="263" text-anchor="middle" font-size="13.5" font-weight="600" fill="#15803d">Keyword</text>
  <text x="635" y="282" text-anchor="middle" font-size="13.5" font-weight="600" fill="#15803d">Filter</text>
  <text x="635" y="308" text-anchor="middle" font-size="10.5" fill="#15803d">account manager roles</text>

  <!-- Arrow: Filter to Dedup -->
  <line x1="720" y1="278" x2="788" y2="278" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Dedup Box -->
  <rect x="790" y="228" width="170" height="100" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="875" y="272" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">Deduplication</text>
  <text x="875" y="308" text-anchor="middle" font-size="10.5" fill="#1d4ed8">skips already-seen jobs</text>

  <!-- Arrow: Dedup to PDF Gen -->
  <line x1="960" y1="278" x2="1028" y2="278" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PDF Generator Box -->
  <rect x="1030" y="228" width="170" height="100" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="1115" y="263" text-anchor="middle" font-size="13.5" font-weight="600" fill="#92400e">PDF</text>
  <text x="1115" y="282" text-anchor="middle" font-size="13.5" font-weight="600" fill="#92400e">Generator</text>
  <text x="1115" y="308" text-anchor="middle" font-size="10.5" fill="#92400e">ReportLab</text>

  <!-- Arrow: PDF Gen to Output -->
  <line x1="1200" y1="278" x2="1268" y2="278" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Daily PDF Output Box -->
  <rect x="1270" y="218" width="170" height="120" rx="12" fill="#1C1C1C" stroke="#1C1C1C" stroke-width="2"/>
  <text x="1355" y="263" text-anchor="middle" font-size="13.5" font-weight="600" fill="#ffffff">Daily PDF</text>
  <text x="1355" y="282" text-anchor="middle" font-size="13.5" font-weight="600" fill="#ffffff">Report</text>
  <text x="1355" y="313" text-anchor="middle" font-size="10.5" fill="#888888">ready each morning</text>

</svg>
