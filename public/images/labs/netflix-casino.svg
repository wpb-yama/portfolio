<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7f1d1d"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Outer chip ring -->
  <circle cx="300" cy="200" r="140" stroke="white" stroke-width="5" fill="rgba(255,255,255,0.05)"/>
  <!-- Inner circle -->
  <circle cx="300" cy="200" r="92" stroke="white" stroke-width="5" fill="rgba(255,255,255,0.07)"/>

  <!-- 8 segment rects at ring centre radius 116 -->
  <!-- Top -->
  <rect x="-10" y="-23" width="20" height="46" rx="5" fill="white" transform="translate(300,84)"/>
  <!-- Upper-right -->
  <rect x="-10" y="-23" width="20" height="46" rx="5" fill="white" transform="translate(382,118) rotate(45)"/>
  <!-- Right -->
  <rect x="-10" y="-23" width="20" height="46" rx="5" fill="white" transform="translate(416,200) rotate(90)"/>
  <!-- Lower-right -->
  <rect x="-10" y="-23" width="20" height="46" rx="5" fill="white" transform="translate(382,282) rotate(-45)"/>
  <!-- Bottom -->
  <rect x="-10" y="-23" width="20" height="46" rx="5" fill="white" transform="translate(300,316)"/>
  <!-- Lower-left -->
  <rect x="-10" y="-23" width="20" height="46" rx="5" fill="white" transform="translate(218,282) rotate(45)"/>
  <!-- Left -->
  <rect x="-10" y="-23" width="20" height="46" rx="5" fill="white" transform="translate(184,200) rotate(90)"/>
  <!-- Upper-left -->
  <rect x="-10" y="-23" width="20" height="46" rx="5" fill="white" transform="translate(218,118) rotate(-45)"/>

  <!-- Centre N -->
  <text x="300" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="88" font-weight="700" fill="white">N</text>
</svg>
