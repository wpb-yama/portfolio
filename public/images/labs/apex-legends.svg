<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D0F"/>
      <stop offset="100%" stop-color="#111115"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CC1A1A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#CC1A1A" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="600" height="400" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="80" x2="600" y2="80" stroke="#1E1E22" stroke-width="1"/>
  <line x1="0" y1="160" x2="600" y2="160" stroke="#1E1E22" stroke-width="1"/>
  <line x1="0" y1="240" x2="600" y2="240" stroke="#1E1E22" stroke-width="1"/>
  <line x1="0" y1="320" x2="600" y2="320" stroke="#1E1E22" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="400" stroke="#1E1E22" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="#1E1E22" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="400" stroke="#1E1E22" stroke-width="1"/>

  <!-- Red accent bar top -->
  <rect x="0" y="0" width="600" height="2" fill="#CC1A1A"/>

  <!-- Left glow -->
  <rect x="0" y="0" width="300" height="400" fill="url(#redGlow)" opacity="0.08"/>

  <!-- ALGS Events card -->
  <rect x="32" y="32" width="250" height="160" rx="8" fill="#18181C" stroke="#2A2A30" stroke-width="1"/>
  <rect x="32" y="32" width="3" height="160" rx="1" fill="#CC1A1A"/>
  <text x="52" y="56" font-family="system-ui, sans-serif" font-size="8" fill="#666" letter-spacing="2" text-anchor="start">PLAYOFFS &amp; CHAMPS</text>
  <text x="52" y="75" font-family="system-ui, sans-serif" font-size="13" fill="#E8E8E8" font-weight="600">ALGS Events</text>

  <!-- Standings rows -->
  <rect x="48" y="88" width="220" height="22" rx="4" fill="#1E1E24"/>
  <text x="60" y="103" font-family="system-ui, sans-serif" font-size="9" fill="#CC1A1A" font-weight="700">1</text>
  <text x="78" y="103" font-family="system-ui, sans-serif" font-size="9" fill="#C9A84C" font-weight="600">Falcons</text>
  <text x="228" y="103" font-family="system-ui, sans-serif" font-size="9" fill="#888" text-anchor="end">246pts</text>

  <rect x="48" y="114" width="220" height="22" rx="4" fill="#1A1A20"/>
  <text x="60" y="129" font-family="system-ui, sans-serif" font-size="9" fill="#888" font-weight="700">2</text>
  <text x="78" y="129" font-family="system-ui, sans-serif" font-size="9" fill="#BBBBC0" font-weight="600">Alliance</text>
  <text x="228" y="129" font-family="system-ui, sans-serif" font-size="9" fill="#888" text-anchor="end">198pts</text>

  <rect x="48" y="140" width="220" height="22" rx="4" fill="#1A1A20"/>
  <text x="60" y="155" font-family="system-ui, sans-serif" font-size="9" fill="#888" font-weight="700">3</text>
  <text x="78" y="155" font-family="system-ui, sans-serif" font-size="9" fill="#BBBBC0" font-weight="600">FNATIC</text>
  <text x="228" y="155" font-family="system-ui, sans-serif" font-size="9" fill="#888" text-anchor="end">174pts</text>

  <!-- Player search card -->
  <rect x="32" y="208" width="250" height="130" rx="8" fill="#18181C" stroke="#2A2A30" stroke-width="1"/>
  <rect x="32" y="208" width="3" height="130" rx="1" fill="#6B7AFF"/>
  <text x="52" y="232" font-family="system-ui, sans-serif" font-size="8" fill="#666" letter-spacing="2">PLAYER LOOKUP</text>
  <rect x="48" y="244" width="220" height="30" rx="6" fill="#111115" stroke="#2A2A30" stroke-width="1"/>
  <text x="64" y="263" font-family="system-ui, sans-serif" font-size="10" fill="#555">Search player name...</text>

  <!-- Stats row -->
  <rect x="48" y="284" width="64" height="42" rx="6" fill="#1E1E24"/>
  <text x="80" y="303" font-family="system-ui, sans-serif" font-size="7" fill="#666" text-anchor="middle" letter-spacing="1">K/D</text>
  <text x="80" y="318" font-family="system-ui, sans-serif" font-size="14" fill="#E8E8E8" font-weight="700" text-anchor="middle">2.41</text>

  <rect x="120" y="284" width="64" height="42" rx="6" fill="#1E1E24"/>
  <text x="152" y="303" font-family="system-ui, sans-serif" font-size="7" fill="#666" text-anchor="middle" letter-spacing="1">KILLS</text>
  <text x="152" y="318" font-family="system-ui, sans-serif" font-size="14" fill="#E8E8E8" font-weight="700" text-anchor="middle">14,821</text>

  <rect x="192" y="284" width="76" height="42" rx="6" fill="#1E1E24"/>
  <text x="230" y="303" font-family="system-ui, sans-serif" font-size="7" fill="#666" text-anchor="middle" letter-spacing="1">DMG</text>
  <text x="230" y="318" font-family="system-ui, sans-serif" font-size="14" fill="#E8E8E8" font-weight="700" text-anchor="middle">2.4M</text>

  <!-- Player detail card (right) -->
  <rect x="302" y="32" width="266" height="306" rx="8" fill="#18181C" stroke="#2A2A30" stroke-width="1"/>
  <rect x="302" y="32" width="266" height="48" rx="8" fill="#1E1E24"/>
  <rect x="302" y="56" width="266" height="24" fill="#1E1E24"/>

  <!-- Avatar -->
  <circle cx="334" cy="56" r="18" fill="#CC1A1A" opacity="0.15" stroke="#CC1A1A" stroke-width="1" stroke-opacity="0.4"/>
  <text x="334" y="61" font-family="system-ui, sans-serif" font-size="14" fill="#CC1A1A" font-weight="700" text-anchor="middle">D</text>

  <text x="360" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#E8E8E8" font-weight="700">DANMANNTIC</text>
  <rect x="360" y="55" width="44" height="14" rx="3" fill="#CC1A1A" opacity="0.2"/>
  <text x="382" y="65" font-family="system-ui, sans-serif" font-size="8" fill="#CC1A1A" font-weight="600" text-anchor="middle">EMEA</text>
  <text x="412" y="65" font-family="system-ui, sans-serif" font-size="8" fill="#888">Falcons</text>

  <!-- Career stats -->
  <text x="320" y="102" font-family="system-ui, sans-serif" font-size="8" fill="#666" letter-spacing="2">CAREER STATS</text>

  <rect x="316" y="112" width="110" height="52" rx="6" fill="#111115"/>
  <text x="371" y="132" font-family="system-ui, sans-serif" font-size="7" fill="#666" text-anchor="middle" letter-spacing="1">TOTAL KILLS</text>
  <text x="371" y="152" font-family="system-ui, sans-serif" font-size="18" fill="#E8E8E8" font-weight="700" text-anchor="middle">3,241</text>

  <rect x="436" y="112" width="110" height="52" rx="6" fill="#111115"/>
  <text x="491" y="132" font-family="system-ui, sans-serif" font-size="7" fill="#666" text-anchor="middle" letter-spacing="1">DAMAGE</text>
  <text x="491" y="152" font-family="system-ui, sans-serif" font-size="18" fill="#E8E8E8" font-weight="700" text-anchor="middle">812K</text>

  <rect x="316" y="172" width="110" height="52" rx="6" fill="#111115"/>
  <text x="371" y="192" font-family="system-ui, sans-serif" font-size="7" fill="#666" text-anchor="middle" letter-spacing="1">EVENTS</text>
  <text x="371" y="212" font-family="system-ui, sans-serif" font-size="18" fill="#E8E8E8" font-weight="700" text-anchor="middle">12</text>

  <rect x="436" y="172" width="110" height="52" rx="6" fill="#111115"/>
  <text x="491" y="192" font-family="system-ui, sans-serif" font-size="7" fill="#666" text-anchor="middle" letter-spacing="1">BEST PLACE</text>
  <text x="491" y="212" font-family="system-ui, sans-serif" font-size="18" fill="#C9A84C" font-weight="700" text-anchor="middle">1st</text>

  <!-- Event history rows -->
  <text x="320" y="248" font-family="system-ui, sans-serif" font-size="8" fill="#666" letter-spacing="2">EVENT HISTORY</text>

  <rect x="316" y="256" width="234" height="20" rx="4" fill="#1E1E24"/>
  <text x="326" y="270" font-family="system-ui, sans-serif" font-size="8" fill="#E8E8E8">Y5 Championship</text>
  <text x="540" y="270" font-family="system-ui, sans-serif" font-size="8" fill="#C9A84C" text-anchor="end" font-weight="600">1st</text>

  <rect x="316" y="280" width="234" height="20" rx="4" fill="#1A1A20"/>
  <text x="326" y="294" font-family="system-ui, sans-serif" font-size="8" fill="#BBBBC0">EWC 2025</text>
  <text x="540" y="294" font-family="system-ui, sans-serif" font-size="8" fill="#AAA" text-anchor="end">3rd</text>

  <rect x="316" y="304" width="234" height="20" rx="4" fill="#1A1A20"/>
  <text x="326" y="318" font-family="system-ui, sans-serif" font-size="8" fill="#BBBBC0">Y5 S1 Open</text>
  <text x="540" y="318" font-family="system-ui, sans-serif" font-size="8" fill="#AAA" text-anchor="end">4th</text>

  <!-- Bottom label -->
  <text x="300" y="380" font-family="system-ui, sans-serif" font-size="9" fill="#333" text-anchor="middle" letter-spacing="3">APEX LEGENDS TRACKER</text>
</svg>
