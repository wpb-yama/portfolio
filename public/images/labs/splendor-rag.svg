<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="600" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Open book (centred slightly left to balance chat bubble) -->
  <!-- Left page -->
  <path d="M 284 148 L 152 164 L 152 272 L 284 256 Z" stroke="white" stroke-width="4.5" stroke-linejoin="round" fill="rgba(255,255,255,0.07)"/>
  <!-- Right page -->
  <path d="M 284 148 L 416 164 L 416 272 L 284 256 Z" stroke="white" stroke-width="4.5" stroke-linejoin="round" fill="rgba(255,255,255,0.07)"/>
  <!-- Spine -->
  <line x1="284" y1="148" x2="284" y2="256" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Text lines left page -->
  <line x1="182" y1="198" x2="264" y2="195" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="182" y1="213" x2="264" y2="210" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="182" y1="228" x2="256" y2="225" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Text lines right page -->
  <line x1="304" y1="195" x2="386" y2="198" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="304" y1="210" x2="386" y2="213" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="304" y1="225" x2="378" y2="228" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Chat bubble (upper right) -->
  <rect x="400" y="104" width="112" height="70" rx="18" stroke="white" stroke-width="4.5" fill="rgba(255,255,255,0.1)"/>
  <!-- Tail pointing down-left -->
  <path d="M 416 174 L 402 196 L 434 174" stroke="white" stroke-width="4.5" stroke-linejoin="round" fill="rgba(255,255,255,0.1)"/>
  <!-- Three dots inside bubble -->
  <circle cx="428" cy="139" r="6" fill="white"/>
  <circle cx="456" cy="139" r="6" fill="white"/>
  <circle cx="484" cy="139" r="6" fill="white"/>
</svg>
